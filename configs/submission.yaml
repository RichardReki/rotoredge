# RotorEdge — the single FROZEN config that produces the headline numbers.
# Backtest is KEYLESS (reads only data/snapshot/). CMC is the live layer (see SKILL.md).
seed: 7
snapshot_dir: data/snapshot
regime_asset: BTC

# Universe (survivorship-bias-free, point-in-time)
universe_n: 15          # top-N eligible tokens by trailing $-volume each rebalance
min_history_days: 130   # required prior history to be eligible (> lookback+skip)
vol_window: 30

# Strategy
momentum: {lookback: 90, skip: 5}
top_k: 5
weighting: inverse_vol  # risk-parity-lite: don't let one high-vol name dominate book risk
rebalance_days: 21      # composition refresh (~monthly)
deadband: 2.0           # high => monthly rebalance only (a reactive daily kill-switch whipsawed OOS)
long_only_positive: false  # hold relatively strongest top-K (regime+vol-target handle downside)
regime: {enabled: true, ma: 100, risk_off_to: cash}
vol_target: {enabled: true, target_vol: 0.35, max_leverage: 1.0}  # institutional risk control
fng: {floor: 0.5, greed_lo: 55, greed_hi: 90, shift: 1}

# BSC / PancakeSwap cost model
costs:
  fee_bps: 25.0
  buffer_bps: 10.0
  gas_usd: 0.20
  pool_depth_usd: 3000000.0
  notional_usd: 100000.0

# Sim window (warmup before this is used to define factors/regime)
backtest: {start: "2019-07-01", end: null}

# Walk-forward (anchored): optimise on train, freeze, evaluate next OOS block, roll.
walkforward:
  train_days: 730
  test_days: 180
  param_grid:
    lookback: [60, 90, 120]
    top_k: [3, 5, 8]

cost_sensitivity: [0.0, 1.0, 2.0]
exclude: []
